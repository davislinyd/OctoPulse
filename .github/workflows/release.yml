name: Release OctoPulse

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh scripts/package-release.sh dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/octopulse.tar.gz
            dist/octopulse.sha256
            install.sh
